# =============================================================================
# config_part_b.yaml — SAR → EO (NIR-SWIR-RedEdge): B8, B11, B5
# =============================================================================

# Band configuration
band_config:  nir_swir_red_edge
out_channels: 3

# Dataset
data_root:      /kaggle/input/sar-eo-cyclegan/CycleGAN_dataset
train_samples:  800
val_samples:    200
test_samples:   200
batch_size:     8

# Training
num_epochs: 10
lr:         0.0002
patience:   7

# Loss weights
lambda_gan:    1.0
lambda_l1:    50.0
lambda_msssim: 0.5
lambda_perc:   0.05

# Output paths
checkpoint_dir: ./checkpoints
output_dir:     ./outputs
