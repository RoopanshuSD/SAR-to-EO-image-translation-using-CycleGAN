# =============================================================================
# config_part_c.yaml — SAR → EO (RGB+NIR): B4, B3, B2, B8  +  NDVI evaluation
# =============================================================================

# Band configuration
band_config:  rgb_nir
out_channels: 4      # 4-channel output: R, G, B, NIR

# Dataset
data_root:      /kaggle/input/sar-eo-cyclegan/CycleGAN_dataset
train_samples:  800
val_samples:    200
test_samples:   200
batch_size:     8

# Training
num_epochs: 10
lr:         0.0002
patience:   7

# Loss weights
lambda_gan:    1.0
lambda_l1:    50.0
lambda_msssim: 0.5
lambda_perc:   0.05

# Output paths
checkpoint_dir: ./checkpoints
output_dir:     ./outputs
